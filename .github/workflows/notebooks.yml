name: Notebook tests

on:
  schedule:
    - cron: "0 8 * * 1"   # 08:00 UTC every Monday
  workflow_dispatch:        # manual trigger from the Actions tab

permissions:
  contents: read

jobs:
  notebooks:
    name: No-auth notebook tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run notebook tests (no-auth notebooks only)
        run: |
          uv run pytest notebooks/ \
            --nbmake \
            --nbmake-timeout=300 \
            --ignore=notebooks/api_smoke_test.ipynb \
            --tb=short \
            -v
