name: Integration tests

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily
  workflow_dispatch:        # manual trigger from the Actions tab

permissions:
  contents: read
  issues: write             # needed to open a failure issue

jobs:
  integration:
    name: Integration tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run integration tests
        id: run_tests
        continue-on-error: true
        # TODO: uncomment the env block below once GitHub Actions secrets are configured.
        # Tests that require credentials (EARTHDATA_TOKEN → OCO-2/EMIT/ESS-DIVE,
        # OPENAQ_API_KEY → OpenAQ) will skip gracefully when the variable is absent.
        # env:
        #   EARTHDATA_TOKEN: ${{ secrets.EARTHDATA_TOKEN }}
        #   OPENAQ_API_KEY: ${{ secrets.OPENAQ_API_KEY }}
        #   ESSDIVE_TOKEN: ${{ secrets.ESSDIVE_TOKEN }}
        run: |
          set -o pipefail
          uv run pytest tests/integration/ -m integration --tb=short -q 2>&1 | tee test_output.txt

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-output
          path: test_output.txt
          if-no-files-found: ignore

      - name: Open GitHub issue on failure
        if: steps.run_tests.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let output = '';
            try { output = fs.readFileSync('test_output.txt', 'utf8'); } catch {}
            const truncated = output.length > 6000
              ? '...(truncated — see artifact for full output)\n' + output.slice(-6000)
              : output;
            const today = new Date().toISOString().split('T')[0];
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Nightly] Integration test failure — ${today}`,
              body: [
                '## Nightly integration tests failed',
                '',
                `**Run:** ${runUrl}`,
                '',
                '<details><summary>Test output</summary>',
                '',
                '```',
                truncated,
                '```',
                '</details>',
              ].join('\n'),
              labels: ['integration-failure'],
            });

      - name: Fail the workflow if tests failed
        if: steps.run_tests.outcome == 'failure'
        run: exit 1
